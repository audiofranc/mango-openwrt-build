name: Build Custom Mango Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
          zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 file

    - name: Download and Extract Image Builder
      run: |
        wget https://openwrt.org
        tar -xJf openwrt-imagebuilder-23.05.0-ramips-mt76x8.Linux-x86_64.tar.xz
        mv openwrt-imagebuilder-23.05.0-ramips-mt76x8.Linux-x86_64 imagebuilder

    - name: Setup Configuration Overlay
      run: |
        # Force create the files target block inside the imagebuilder directory
        mkdir -p imagebuilder/files
        
        # Safely sync repository configurations if the folder is populated
        if [ -d "files" ] && [ "$(ls -A files)" ]; then
          cp -R files/* imagebuilder/files/
        fi

    - name: Run OpenWrt Image Builder
      run: |
        cd imagebuilder
        # Passing files securely via relative path context execution
        make image PROFILE="glinet_gl-mt300n-v2" FILES="files" PACKAGES="luci \
          kmod-usb-storage kmod-fs-ext4 kmod-fs-vfat block-mount \
          luci-proto-wireguard \
          gawk sed coreutils-sort"

    - name: Upload Compiled Firmware
      uses: actions/upload-artifact@v4
      with:
        name: MT300NV2-Custom-Firmware
        path: imagebuilder/bin/targets/ramips/mt76x8/*sysupgrade.bin
